<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TabOrg</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1 id="greeting">Good evening</h1>
        <p id="todayLabel">Thursday, May 21, 2026</p>
      </header>

      <section class="content" aria-live="polite">
        <div class="section-head">
          <div class="open-tabs-title">
            <h2 id="viewTitle">Open tabs</h2>
          </div>
          <div class="section-actions">
            <span id="domainCount">0 domains</span>
            <button id="closeAllButton" class="danger-button" type="button">Close all 0 tabs</button>
            <button id="refreshButton" class="ghost-button" type="button">Refresh</button>
          </div>
        </div>
        <div id="notice" class="notice" hidden></div>
        <div id="results" class="results domains-results"></div>

        <section id="savedSection" class="saved-section" hidden>
          <div class="saved-head">
            <div class="saved-title">
              <h2>Saved list</h2>
            </div>
            <span id="savedCount">0 saved</span>
          </div>
          <div id="savedList" class="saved-list"></div>
        </section>
      </section>
    </main>

    <template id="tabTemplate">
      <article class="tab-row">
        <img class="favicon" alt="">
        <div class="tab-main">
          <h3></h3>
          <p></p>
        </div>
        <div class="tab-actions">
          <button class="save-tab" type="button" aria-label="Save tab">♡</button>
          <button class="icon-button close-tab" type="button" aria-label="Close tab">×</button>
        </div>
      </article>
    </template>

    <template id="savedTemplate">
      <article class="saved-card">
        <img class="favicon" alt="">
        <div class="saved-main">
          <h3></h3>
          <p></p>
        </div>
        <div class="saved-actions">
          <button class="ghost-button open-saved" type="button">Open</button>
          <button class="icon-button remove-saved" type="button" aria-label="Remove saved item">×</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
